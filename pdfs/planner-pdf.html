<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planner – Printable PDF</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            padding: 0;
            background: white;
            color: #333;
        }

        .page {
            width: 100%;
            max-width: 800px;
            margin: auto;
            padding: 20px;
            border: 2px solid #ccc;
            border-radius: 10px;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
        }

        h2 {
            margin-top: 30px;
            border-bottom: 1px solid #ccc;
            padding-bottom: 5px;
        }

        .section {
            margin-bottom: 25px;
        }

        .line {
            height: 25px;
            border-bottom: 1px solid #999;
            margin: 8px 0;
        }

        /* Print settings */
        @media print {
            body {
                margin: 0;
            }
            .page {
                border: none;
                padding: 0;
            }
        }
    </style>
</head>

<body>

<div class="page">

    <h1>Planner</h1>
    <p style="text-align:center;">Your daily planning sheet</p>

    <div class="section">
        <h2>Today's Priorities</h2>
        <div class="line"></div>
        <div class="line"></div>
        <div class="line"></div>
    </div>

    <div class="section">
        <h2>To‑Do List</h2>
        <div class="line"></div>
        <div class="line"></div>
        <div class="line"></div>
        <div class="line"></div>
        <div class="line"></div>
    </div>

    <div class="section">
        <h2>Notes</h2>
        <div class="line" style="height:60px;"></div>
    </div>

</div>

</body>
</html>
